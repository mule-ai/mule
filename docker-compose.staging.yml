# Staging environment configuration
# Usage: docker-compose -f docker-compose.staging.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: mule-staging-postgres
    environment:
      POSTGRES_DB: mulev2
      POSTGRES_USER: mule
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mule_staging_pass}
    ports:
      - "5433:5432"
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./internal/database/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mule -d mulev2"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mule-staging-network
    restart: unless-stopped

  mule:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mule-staging-api
    ports:
      - "8141:8080"
    environment:
      - DB_CONN_STRING=postgres://mule:${POSTGRES_PASSWORD:-mule_staging_pass}@postgres:5432/mulev2?sslmode=disable
      - LOG_LEVEL=debug
      - PI_PROVIDER=${PI_PROVIDER:-anthropic}
      - PI_MODEL=${PI_MODEL:-claude-3-5-sonnet-20241022}
    command: ["-db", "postgres://mule:${POSTGRES_PASSWORD:-mule_staging_pass}@postgres:5432/mulev2?sslmode=disable", "-listen", ":8080"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mule-staging-network
    restart: unless-stopped

volumes:
  staging_postgres_data:
    driver: local

networks:
  mule-staging-network:
    driver: bridge
